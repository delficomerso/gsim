changelog:
  exclude:
    authors:
      - github-actions[bot]
      - dependabot[bot]
  categories:
    - title: New Features
      labels:
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Refactoring
      labels:
        - refactor
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
